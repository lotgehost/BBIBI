<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBIBIP</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:    #0a0a0a;
  --green: #00ff88;
  --mid:   #141414;
  --muted: #444;
  --red:   #ff3355;
}

@media (min-width: 600px) {
  html, body {
    width: 100%; height: 100%;
    background: #050505;
    display: flex; align-items: center; justify-content: center;
  }
  .app { width: 480px; height: 300px; flex-shrink: 0; }
}
@media (max-width: 599px) {
  html, body { width: 100%; height: 100%; }
  .app { width: 100%; height: 100svh; }
}

.app {
  background: var(--bg);
  border: 1px solid var(--green);
  display: flex; flex-direction: column;
  font-family: 'Courier New', monospace;
  overflow: hidden; position: relative;
}

/* ── HEADER ── */
.hdr {
  background: var(--green);
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 10px; flex-shrink: 0;
}
.hdr-title { color: #000; font-size: 10px; font-weight: bold; letter-spacing: 4px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-count { color: #000; font-size: 9px; letter-spacing: 1px; }
.hdr-btn {
  background: none; border: none; color: #000;
  font-size: 11px; cursor: pointer; font-family: inherit; padding: 0; opacity: 0.7;
}
.hdr-btn:hover { opacity: 1; }

/* ── DISPLAY (4/5) ── */
.display {
  flex: 4; position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: center;
  padding: 16px 22px 28px;
}
.display::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0px, transparent 3px,
    rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
  );
  pointer-events: none; z-index: 0;
}
.display-inner { position: relative; z-index: 1; transition: opacity 0.45s ease; }
.display-inner.fading { opacity: 0; }

.note-text {
  color: var(--green); font-size: 14px; line-height: 1.9;
  word-break: keep-all; overflow-wrap: break-word;
  display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
}
@media (max-width: 599px) { .note-text { font-size: 15px; -webkit-line-clamp: 8; } }

.note-meta { margin-top: 12px; font-size: 10px; color: var(--muted); letter-spacing: 1px; display: flex; gap: 12px; }
.empty-msg { color: var(--muted); font-size: 11px; line-height: 2.4; letter-spacing: 1px; text-align: center; }
.empty-msg span { color: var(--green); }

/* ── PROGRESS BAR (hidden) ── */
.pbar { display: none; }

/* ── INPUT (1/5) ── */
.input-row {
  flex: 1; background: var(--mid); border-top: 1px solid #1e1e1e;
  display: flex; align-items: center; padding: 0 10px; gap: 8px; min-height: 0;
}
.prompt { color: var(--green); font-size: 13px; flex-shrink: 0; user-select: none; }
.note-inp {
  flex: 1; background: none; border: none; color: var(--green);
  font-family: 'Courier New', monospace; font-size: 12px;
  outline: none; min-width: 0; caret-color: var(--green);
}
.note-inp::placeholder { color: #2a2a2a; }
@media (max-width: 599px) { .note-inp { font-size: 14px; } }
.save-btn {
  background: var(--green); border: none; color: #000;
  font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold;
  padding: 6px 12px; cursor: pointer; letter-spacing: 1px; flex-shrink: 0;
}
.save-btn:hover { background: #00cc66; }

/* ── LIST OVERLAY ── */
.list-overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; z-index: 15; }
.list-overlay.hidden { display: none; }
.list-hdr {
  background: var(--green); display: flex; justify-content: space-between; align-items: center;
  padding: 5px 10px; flex-shrink: 0;
}
.list-hdr-title { color: #000; font-size: 10px; font-weight: bold; letter-spacing: 3px; }
.list-close { background: none; border: none; color: #000; font-size: 10px; cursor: pointer; font-family: inherit; opacity: 0.7; padding: 0; }
.list-close:hover { opacity: 1; }
.list-body { flex: 1; overflow-y: auto; }
.list-body::-webkit-scrollbar { width: 3px; }
.list-body::-webkit-scrollbar-thumb { background: #222; }
.list-item { padding: 10px 14px; border-bottom: 1px solid #111; cursor: pointer; transition: background 0.15s; }
.list-item:hover { background: #111; }
.list-item-text {
  color: var(--green); font-size: 12px; line-height: 1.7; word-break: keep-all;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.list-item-meta { font-size: 9px; color: #333; margin-top: 5px; letter-spacing: 1px; }
.list-item-del { float: right; background: none; border: none; color: #2a2a2a; font-size: 10px; cursor: pointer; font-family: inherit; padding: 0 0 0 8px; }
.list-item-del:hover { color: var(--red); }
.list-empty { text-align: center; color: #333; font-size: 11px; letter-spacing: 1px; padding: 40px 20px; line-height: 2.4; }

/* ── TOAST ── */
#toast {
  position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
  background: var(--mid); color: var(--green); padding: 5px 14px;
  font-size: 9px; letter-spacing: 2px; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; border: 1px solid #222; white-space: nowrap; z-index: 30;
}
</style>
</head>
<body>
<div class="app">

  <!-- ── LIST OVERLAY ── -->
  <div class="list-overlay hidden" id="listOverlay">
    <div class="list-hdr">
      <span class="list-hdr-title">ALL NOTES</span>
      <button class="list-close" onclick="closeList()">✕ 닫기</button>
    </div>
    <div class="list-body" id="listBody"></div>
  </div>

  <!-- ── HEADER ── -->
  <div class="hdr">
    <span class="hdr-title">BBIBIP</span>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="openList()" title="전체 보기">≡</button>
      <span class="hdr-count" id="hdrCount">0 NOTES</span>
    </div>
  </div>

  <!-- ── DISPLAY ── -->
  <div class="display">
    <div class="display-inner" id="displayInner"></div>
    <div class="pbar"><div class="pbar-fill" id="pbarFill"></div></div>
  </div>

  <!-- ── INPUT ── -->
  <div class="input-row">
    <span class="prompt">&gt;</span>
    <input class="note-inp" id="noteInp" placeholder="인사이트 입력 · 출처 추가: 텍스트 // 출처명">
    <button class="save-btn" onclick="saveNote()">저장</button>
  </div>

  <div id="toast"></div>
</div>

<script>
const FB  = 'https://bbibi-8aebd-default-rtdb.asia-southeast1.firebasedatabase.app';
const KEY = 'bbibip';
const LKEY = 'bbibip_notes';
const CYCLE = 3 * 60 * 60 * 1000; // 3시간

let notes = [], idx = 0, autoTmr = null;

// ── INIT
async function init() {
  const raw = localStorage.getItem(LKEY);
  notes = raw ? JSON.parse(raw) : [];
  try {
    const res = await fetch(`${FB}/${KEY}/notes.json`);
    if (res.ok) {
      const data = await res.json();
      if (data) {
        const fbNotes = Object.values(data);
        const ids = new Set(notes.map(n => n.id));
        fbNotes.forEach(n => { if (!ids.has(n.id)) notes.push(n); });
        notes.sort((a, b) => a.ts - b.ts);
        persist();
      }
    }
  } catch(e) {}
  if (notes.length > 0) idx = Math.floor(Math.random() * notes.length);
  render();
  document.getElementById('noteInp').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveNote(); }
  });
}

// ── SAVE
async function saveNote() {
  const inp = document.getElementById('noteInp');
  const raw = inp.value.trim();
  if (!raw) return;
  let text = raw, source = '';
  const sep = raw.indexOf(' // ');
  if (sep !== -1) { text = raw.slice(0, sep).trim(); source = raw.slice(sep + 4).trim(); }
  const note = { id: Date.now().toString(), text, source, ts: Date.now() };
  notes.push(note); persist(); inp.value = '';
  try {
    await fetch(`${FB}/${KEY}/notes/${note.id}.json`, { method: 'PUT', body: JSON.stringify(note) });
  } catch(e) {}
  document.getElementById('hdrCount').textContent = `${notes.length} NOTES`;
  toast('저장됨');
}

function persist() { localStorage.setItem(LKEY, JSON.stringify(notes)); }

// ── RENDER
function render() {
  const n = notes.length;
  document.getElementById('hdrCount').textContent = `${n} NOTE${n !== 1 ? 'S' : ''}`;
  const inner = document.getElementById('displayInner');
  if (n === 0) {
    inner.innerHTML = `<div class="empty-msg">
      <span>BBIBIP</span><br><br>
      아직 기록이 없습니다.<br>
      아래 입력창에 첫 인사이트를 남겨보세요.<br><br>
      <span style="color:#1e1e1e">출처 추가: 텍스트 // 출처명</span>
    </div>`;
    stopAuto(); return;
  }
  if (idx < 0) idx = 0;
  if (idx >= n) idx = n - 1;
  showNote(); startAuto();
}

function showNote(fade) {
  const inner = document.getElementById('displayInner');
  const note  = notes[idx];
  const doRender = () => {
    inner.innerHTML = `
      <div class="note-text">"${esc(note.text)}"</div>
      <div class="note-meta">
        ${note.source ? `<span>— ${esc(note.source)}</span>` : ''}
        <span style="color:#2a2a2a">${fmtDate(note.ts)}</span>
      </div>`;
    inner.classList.remove('fading');
  };
  if (fade) { inner.classList.add('fading'); setTimeout(doRender, 450); }
  else doRender();
}

// ── AUTO-ADVANCE
function startAuto() {
  stopAuto();
  if (notes.length <= 1) return;
  startPbar();
  autoTmr = setTimeout(() => {
    let next;
    do { next = Math.floor(Math.random() * notes.length); }
    while (next === idx && notes.length > 1);
    idx = next; showNote(true); startAuto();
  }, CYCLE);
}
function stopAuto() { if (autoTmr) { clearTimeout(autoTmr); autoTmr = null; } stopPbar(); }
function startPbar() {
  stopPbar();
  const f = document.getElementById('pbarFill');
  f.style.transition = 'none'; f.style.width = '0%'; f.offsetWidth;
  f.style.transition = `width ${CYCLE}ms linear`; f.style.width = '100%';
}
function stopPbar() {
  const f = document.getElementById('pbarFill');
  f.style.transition = 'none'; f.style.width = '0%';
}

// ── LIST
function openList() {
  const body = document.getElementById('listBody');
  if (!notes.length) {
    body.innerHTML = `<div class="list-empty">아직 기록이 없습니다.</div>`;
  } else {
    const sorted = [...notes].sort((a, b) => b.ts - a.ts);
    body.innerHTML = sorted.map(n => `
      <div class="list-item" onclick="jumpToNote('${n.id}')">
        <button class="list-item-del" onclick="deleteNote(event,'${n.id}')">✕</button>
        <div class="list-item-text">${esc(n.text)}</div>
        <div class="list-item-meta">${n.source ? esc(n.source) + '  ·  ' : ''}${fmtDate(n.ts)}</div>
      </div>`).join('');
  }
  document.getElementById('listOverlay').classList.remove('hidden');
}
function closeList() { document.getElementById('listOverlay').classList.add('hidden'); }
function jumpToNote(id) {
  const i = notes.findIndex(n => n.id === id);
  if (i !== -1) { idx = i; showNote(true); startAuto(); }
  closeList();
}
async function deleteNote(e, id) {
  e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  persist();
  try { await fetch(`${FB}/${KEY}/notes/${id}.json`, { method: 'DELETE' }); } catch(e) {}
  if (idx >= notes.length) idx = Math.max(0, notes.length - 1);
  render(); openList(); toast('삭제됨');
}

// ── UTILS
function fmtDate(ts) { const d = new Date(ts); return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2, '0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 1400);
}

init();
</script>
</body>
</html>
