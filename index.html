<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>PET-MSG</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --green:#00ff88; --red:#ff3355; --bg:#0a0a0a; --mid:#1a1a1a; }
body {
  background: var(--bg);
  font-family: 'Courier New', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* ── SETUP ──────────────────────────── */
#setup {
  width: 100%; max-width: 320px;
  padding: 40px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.s-title { color: var(--green); font-size: 22px; font-weight: bold; letter-spacing: 3px; text-align: center; }
.s-sub   { color: #444; font-size: 11px; text-align: center; line-height: 1.8; }
.s-label { color: var(--green); font-size: 10px; }
.s-input {
  width: 100%; background: #111; border: 1px solid var(--green);
  color: var(--green); font-family: 'Courier New', monospace;
  font-size: 14px; padding: 10px 12px; outline: none;
}
.s-input::placeholder { color: #444; }
.s-btn {
  width: 100%; background: var(--green); border: none; color: #000;
  font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold;
  padding: 12px; cursor: pointer; letter-spacing: 2px; margin-top: 4px;
}
.s-err { color: var(--red); font-size: 10px; text-align: center; }

/* ── MAIN ───────────────────────────── */
#main {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100dvh;
  gap: 0;
}

#pet {
  display: block;
  /* JS로 크기 설정됨 */
}

.hint {
  color: #333; font-size: 12px; text-align: center;
  margin-top: 10px;
  letter-spacing: 1px; height: 16px;
}
.hint.blink { color: var(--green); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MESSAGE OVERLAY ────────────────── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 24px;
}
#overlay.open { display: flex; }

.msg-card {
  width: 100%; max-width: 320px;
  background: var(--bg);
  border: 1px solid var(--green);
  display: flex; flex-direction: column;
  gap: 0;
}
.msg-card-header {
  background: var(--green);
  color: #000;
  font-size: 10px; font-weight: bold;
  padding: 7px 12px;
  letter-spacing: 2px;
  display: flex; justify-content: space-between;
}
.msg-card-body {
  padding: 16px;
  color: var(--green);
  font-size: 14px;
  line-height: 1.7;
  min-height: 80px;
  border-bottom: 1px solid #1a1a1a;
}
.msg-card-reply {
  padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.reply-input {
  width: 100%; background: #111; border: 1px solid #333;
  color: var(--green); font-family: 'Courier New', monospace;
  font-size: 13px; padding: 8px 10px; outline: none; resize: none; height: 52px;
}
.reply-input:focus { border-color: var(--green); }
.reply-input::placeholder { color: #444; }
.reply-row {
  display: flex; justify-content: space-between; align-items: center;
}
.char-c { font-size: 9px; color: #444; }
.char-c.warn { color: var(--red); }
.reply-btns { display: flex; gap: 6px; }
.btn-close {
  background: transparent; border: 1px solid #333; color: #555;
  font-family: 'Courier New', monospace; font-size: 10px; padding: 5px 10px; cursor: pointer;
}
.btn-send {
  background: var(--green); border: none; color: #000;
  font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold;
  padding: 5px 14px; cursor: pointer; letter-spacing: 1px;
}
.btn-send:disabled { background: #333; color: #555; cursor: default; }

/* ── TOAST ──────────────────────────── */
#toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: var(--mid); border: 1px solid var(--green); color: var(--green);
  font-size: 11px; padding: 7px 16px; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 200;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-title">PET-MSG</div>
  <div class="s-sub">삐삐 감성 E2E 암호화 메신저<br>두 기기에 동일한 키를 입력하세요</div>
  <div class="s-label">▸ 채널 ID</div>
  <input class="s-input" id="inp-ch" placeholder="ex) lab42-secret" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
  <div class="s-label">▸ 비밀 키 (8자 이상)</div>
  <input class="s-input" id="inp-psk" placeholder="공유된 비밀 키" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
  <div class="s-err" id="s-err"></div>
  <button class="s-btn" id="s-btn">접속 →</button>
</div>

<!-- MAIN -->
<div id="main">
  <canvas id="pet" style="cursor:pointer;display:block;"></canvas>
  <div class="hint" id="hint">· · ·</div>
</div>

<!-- MESSAGE OVERLAY -->
<div id="overlay">
  <div class="msg-card">
    <div class="msg-card-header">
      <span>수신 메시지</span>
      <span id="msg-time"></span>
    </div>
    <div class="msg-card-body" id="msg-body"></div>
    <div class="msg-card-reply">
      <textarea class="reply-input" id="reply-input" placeholder="답장 입력... (최대 80자)" maxlength="80"></textarea>
      <div class="reply-row">
        <span class="char-c" id="char-c">0/80</span>
        <div class="reply-btns">
          <button class="btn-close" id="btn-close">닫기</button>
          <button class="btn-send" id="btn-reply" disabled>SEND</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const STORE_KEY = 'petmsg_v2';
function loadCfg() { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } }
function saveCfg(c) { localStorage.setItem(STORE_KEY, JSON.stringify(c)); }
function nanoid(n=12) {
  return Array.from(crypto.getRandomValues(new Uint8Array(n)))
    .map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,n);
}

// ─── CRYPTO ────────────────────────────────────────────────
async function deriveKey(psk) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(psk), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode('petmsg-salt-v1'), iterations:100000, hash:'SHA-256' },
    mat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
function toB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function fromB64(b64) { return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
async function encryptMsg(text, psk) {
  const key = await deriveKey(psk);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const buf = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(text));
  const out = new Uint8Array(12+buf.byteLength);
  out.set(iv); out.set(new Uint8Array(buf),12);
  return toB64(out);
}
async function decryptMsg(b64, psk) {
  const key  = await deriveKey(psk);
  const data = fromB64(b64);
  const buf  = await crypto.subtle.decrypt({name:'AES-GCM',iv:data.slice(0,12)}, key, data.slice(12));
  return new TextDecoder().decode(buf);
}

// ─── RELAY ─────────────────────────────────────────────────
const DB = 'https://bbibi-8aebd-default-rtdb.asia-southeast1.firebasedatabase.app';
async function relayPost(channelId, fromId, cipher) {
  const res = await fetch(`${DB}/${channelId}/messages.json`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ from:fromId, cipher, ts:Date.now() })
  });
  if (!res.ok) throw new Error('전송 실패');
}
async function relayPoll(channelId, since) {
  const res = await fetch(`${DB}/${channelId}/messages.json?orderBy="$key"&limitToLast=10`);
  if (!res.ok) return [];
  const data = await res.json();
  if (!data) return [];
  return Object.values(data).filter(m=>m.ts>since).sort((a,b)=>a.ts-b.ts);
}

// ─── PET CANVAS ────────────────────────────────────────────
let petState='idle', petFrame=0, petBlink=true, petBlinkT=0, petBlinkCD=90;
const STATES=['idle','idle','idle','thinking','sleeping'];

function drawPet(canvas, state) {
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const G='#00ff88', DIM='#002211', MID='#1a1a1a', DARK='#0d0d0d';
  const YEL='#ffdd00', f=petFrame;

  petBlinkT++;
  if(petBlinkT>=petBlinkCD){
    petBlink=false;
    if(petBlinkT>=petBlinkCD+4){petBlink=true;petBlinkT=0;petBlinkCD=70+Math.floor(Math.random()*80);}
  }

  ctx.clearRect(0,0,W,H);
  const bob=Math.sin(f*0.1)*2.5, by=Math.round(bob), cx=W/2, base=155;

  // scanlines
  ctx.strokeStyle=DIM; ctx.lineWidth=1;
  for(let y=0;y<H;y+=4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // border + top bar
  ctx.strokeStyle=G; ctx.lineWidth=1; ctx.strokeRect(1,1,W-2,H-2);
  ctx.fillStyle=G; ctx.fillRect(2,2,W-4,13);
  ctx.fillStyle='#000'; ctx.font="bold 6px 'Courier New'"; ctx.textAlign='center';
  ctx.fillText(`PET-MSG  [${state.toUpperCase().slice(0,5).padEnd(5)}]`,cx,11);

  // antenna
  const hy=base-62+by;
  ctx.strokeStyle=G; ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx,hy-14);ctx.stroke();
  ctx.fillStyle=state==='mail'?YEL:DARK;
  ctx.beginPath();ctx.arc(cx,hy-18,4.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=G;ctx.stroke();

  // head
  ctx.fillStyle=MID; ctx.strokeStyle=G; ctx.lineWidth=2;
  ctx.fillRect(cx-20,hy,40,32); ctx.strokeRect(cx-20,hy,40,32);

  // eyes
  const ey=hy+14;
  if(state==='sleeping'||!petBlink){
    ctx.strokeStyle=G;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-12,ey);ctx.lineTo(cx-5,ey);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+5,ey);ctx.lineTo(cx+12,ey);ctx.stroke();
  } else {
    const ec=state==='mail'?YEL:G;
    ctx.fillStyle=DARK;ctx.strokeStyle=ec;ctx.lineWidth=2;
    ctx.fillRect(cx-13,ey-4,9,9);ctx.strokeRect(cx-13,ey-4,9,9);
    ctx.fillRect(cx+4,ey-4,9,9);ctx.strokeRect(cx+4,ey-4,9,9);
    ctx.fillStyle=ec;
    ctx.fillRect(cx-10-1,ey-1,3,3);ctx.fillRect(cx+7-1,ey-1,3,3);
  }

  // mouth
  const my=hy+26;
  ctx.strokeStyle=G;ctx.lineWidth=2;
  if(state==='sleeping'){ctx.beginPath();ctx.arc(cx,my+2,6,Math.PI,2*Math.PI);ctx.stroke();}
  else if(state==='mail'){ctx.beginPath();ctx.arc(cx,my-1,8,0.3,Math.PI-0.3);ctx.stroke();}
  else if(state==='thinking'){ctx.fillStyle=G;ctx.beginPath();ctx.arc(cx,my,2.5,0,Math.PI*2);ctx.fill();}
  else{ctx.beginPath();ctx.moveTo(cx-7,my);ctx.lineTo(cx+7,my);ctx.stroke();}

  // body
  const bx=cx-18, bodyY=hy+30;
  ctx.fillStyle=MID;ctx.strokeStyle=G;ctx.lineWidth=2;
  ctx.fillRect(bx,bodyY,36,38);ctx.strokeRect(bx,bodyY,36,38);

  // CPU
  ctx.fillStyle=DARK;ctx.strokeStyle=G;ctx.lineWidth=1;
  ctx.fillRect(bx+18,bodyY+5,12,8);ctx.strokeRect(bx+18,bodyY+5,12,8);
  ctx.fillStyle=G;ctx.font="bold 4px 'Courier New'";ctx.textAlign='center';
  ctx.fillText('CPU',bx+24,bodyY+11);

  // LEDs
  [[G,state==='mail'&&f%4<2],['#3388ff',state==='sleeping'&&f%20<10]].forEach(([col,bk],i)=>{
    const lx=bx+4+i*8, ly=bodyY+26;
    ctx.fillStyle=bk?DARK:col;ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(lx+2,ly+2,2.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  });

  // arms
  const ay=bodyY+10;
  ctx.strokeStyle=G;ctx.lineWidth=3;
  if(state==='mail'){
    // left arm normal down
    ctx.beginPath();ctx.moveTo(bx,ay);ctx.lineTo(bx-12,ay+14);ctx.stroke();
    // right arm raised holding letter
    ctx.beginPath();ctx.moveTo(bx+36,ay);ctx.lineTo(bx+50,ay-14);ctx.stroke();
    // envelope
    const ex=bx+49, ey2=ay-26;
    ctx.fillStyle=YEL;ctx.strokeStyle=YEL;ctx.lineWidth=1;
    ctx.fillRect(ex-9,ey2-6,18,12);
    ctx.strokeStyle=DARK;
    ctx.beginPath();ctx.moveTo(ex-9,ey2-6);ctx.lineTo(ex,ey2+1);ctx.lineTo(ex+9,ey2-6);ctx.stroke();
    ctx.strokeStyle=YEL;ctx.lineWidth=1;ctx.strokeRect(ex-9,ey2-6,18,12);
  } else if(state==='sleeping'){
    ctx.beginPath();ctx.moveTo(bx,ay+6);ctx.lineTo(bx-10,ay+18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+36,ay+6);ctx.lineTo(bx+46,ay+18);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(bx,ay);ctx.lineTo(bx-12,ay+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+36,ay);ctx.lineTo(bx+48,ay+14);ctx.stroke();
  }

  // legs
  const legY=bodyY+38;
  ctx.fillStyle=MID;ctx.strokeStyle=G;ctx.lineWidth=2;
  ctx.fillRect(cx-14,legY,8,12);ctx.strokeRect(cx-14,legY,8,12);
  ctx.fillRect(cx+6,legY,8,12);ctx.strokeRect(cx+6,legY,8,12);
  ctx.fillRect(cx-16,legY+9,12,8);ctx.strokeRect(cx-16,legY+9,12,8);
  ctx.fillRect(cx+4,legY+9,12,8);ctx.strokeRect(cx+4,legY+9,12,8);

  // sleeping zzz
  if(state==='sleeping'){
    ctx.fillStyle=G;
    ['z','Z','Z'].forEach((c,i)=>{
      if((Math.floor(f/18)+i)%4<3){
        ctx.font=`bold ${6+i*2}px 'Courier New'`;ctx.textAlign='left';
        ctx.fillText(c,cx+18+i*8,hy-2-i*8+by);
      }
    });
  }

  // bottom bar
  ctx.fillStyle=DIM;ctx.fillRect(2,H-12,W-4,10);
  ctx.fillStyle=G;ctx.font="bold 5px 'Courier New'";ctx.textAlign='center';
  ctx.fillText(`TICK:${String(f).padStart(5,'0')}  MEM:OK`,cx,H-4);
}

// ─── APP STATE ─────────────────────────────────────────────
let cfg=null, pendingMsg=null;

function toast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function fmtTime(ts){
  const d=new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

// ─── OVERLAY ───────────────────────────────────────────────
function openOverlay() {
  if (!pendingMsg) return;
  document.getElementById('msg-body').textContent = pendingMsg.text;
  document.getElementById('msg-time').textContent  = fmtTime(pendingMsg.ts);
  document.getElementById('reply-input').value = '';
  document.getElementById('char-c').textContent = '0/80';
  document.getElementById('btn-reply').disabled = true;
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  pendingMsg = null;
  petState = 'idle';
  document.getElementById('hint').textContent = '· · ·';
  document.getElementById('hint').classList.remove('blink');
}

// ─── SETUP ─────────────────────────────────────────────────
document.getElementById('s-btn').onclick = () => {
  const chan = document.getElementById('inp-ch').value.trim();
  const psk  = document.getElementById('inp-psk').value.trim();
  const err  = document.getElementById('s-err');
  if (!chan)        { err.textContent='채널 ID를 입력하세요'; return; }
  if (psk.length<8) { err.textContent='비밀 키는 8자 이상이어야 해요'; return; }
  err.textContent='';
  cfg = { channelId:chan, psk, myId:nanoid(), lastSeen:0 };
  saveCfg(cfg);
  startMain();
};

// ─── REPLY ─────────────────────────────────────────────────
document.getElementById('reply-input').addEventListener('input', e=>{
  const n=e.target.value.length;
  document.getElementById('char-c').textContent=`${n}/80`;
  document.getElementById('char-c').className='char-c'+(n>64?' warn':'');
  document.getElementById('btn-reply').disabled=n===0;
});
document.getElementById('reply-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doReply();}
});
document.getElementById('btn-reply').onclick = doReply;
document.getElementById('btn-close').onclick  = closeOverlay;

async function doReply() {
  const text = document.getElementById('reply-input').value.trim();
  if (!text||!cfg) return;
  closeOverlay();
  try {
    const cipher = await encryptMsg(text, cfg.psk);
    await relayPost(cfg.channelId, cfg.myId, cipher);
    toast('전송됨 ✓');
    petState='idle';
  } catch { toast('전송 실패 ✗'); }
}

// ─── MAIN ──────────────────────────────────────────────────
function startMain() {
  document.getElementById('setup').style.display='none';
  document.getElementById('main').style.display='flex';

  const canvas=document.getElementById('pet');

  // 화면 채우도록 캔버스 크기 조정 (가로/세로 꽉 채우되 힌트 공간 확보)
  function resizeCanvas() {
    const hintH = 44;
    const vw = window.innerWidth;
    const vh = window.innerHeight - hintH;
    // 4:5 비율 유지하며 화면 꽉 채우기
    const scale = Math.min(vw / 160, vh / 200);
    canvas.width  = Math.floor(160 * scale);
    canvas.height = Math.floor(200 * scale);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // pet click
  canvas.onclick = () => {
    if (pendingMsg) openOverlay();
  };

  // pet animation
  let stateT=0;
  setInterval(()=>{
    petFrame++;
    stateT++;
    if(petState!=='mail' && stateT>(90+Math.random()*120|0)){
      petState=STATES[Math.floor(Math.random()*STATES.length)];
      stateT=0;
    }
    drawPet(canvas, petState);
  }, 1000/30);

  pollLoop();
}

// ─── POLL ──────────────────────────────────────────────────
async function pollLoop() {
  while (true) {
    if (cfg) {
      try {
        const msgs = await relayPoll(cfg.channelId, cfg.lastSeen||0);
        for (const m of msgs) {
          if (m.from !== cfg.myId) {
            try {
              const text = await decryptMsg(m.cipher, cfg.psk);
              pendingMsg = { text, ts: m.ts };
              petState = 'mail';
              const hint = document.getElementById('hint');
              hint.textContent = '▸ 탭해서 확인';
              hint.classList.add('blink');
            } catch { /* 복호화 실패 무시 */ }
          }
          if (m.ts > (cfg.lastSeen||0)) { cfg.lastSeen=m.ts; saveCfg(cfg); }
        }
      } catch { /* 오프라인 무시 */ }
    }
    await new Promise(r=>setTimeout(r,3000));
  }
}

// ─── INIT ──────────────────────────────────────────────────
const saved = loadCfg();
if (saved) { cfg=saved; startMain(); }
</script>
</body>
</html>
